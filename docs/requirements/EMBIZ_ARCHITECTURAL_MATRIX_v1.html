<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMBIZ // ARCHITECTURAL MATRIX</title>
<style>
  :root{
    --bg:#000000; --panel:#0b0b0b; --box:#070707;
    --line:#8f8f8f; --line-dim:#4a4a4a; --line-faint:#2c2c2c;
    --txt:#e6e6e6; --txt-dim:#9a9a9a; --txt-faint:#5d5d5d;
    --hot:#ffffff; --led:#d8d8d8;
    --mono:"SF Mono","Menlo","Consolas","DejaVu Sans Mono",monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--mono)}

  /* ---------- top strip ---------- */
  #topbar{
    position:fixed;top:0;left:0;right:0;height:26px;z-index:40;
    background:#050505;border-bottom:1px solid var(--line-faint);
    display:flex;align-items:center;gap:0;font-size:9px;letter-spacing:.08em;
    user-select:none;
  }
  #topbar .brand{padding:0 12px;color:var(--txt);border-right:1px solid var(--line-faint);height:100%;display:flex;align-items:center;gap:7px;white-space:nowrap}
  #topbar .brand .dot{width:6px;height:6px;border:1px solid var(--line);border-radius:50%}
  #crumbs{display:flex;align-items:center;height:100%;overflow:hidden;flex:1;min-width:0}
  .crumb{padding:0 10px;height:100%;display:flex;align-items:center;color:var(--txt-dim);
    border-right:1px solid var(--line-faint);cursor:pointer;white-space:nowrap}
  .crumb:hover{color:var(--txt);background:#0e0e0e}
  .crumb.cur{color:var(--txt)}
  .crumb .sep{margin-left:10px;color:var(--txt-faint)}
  #topbar .keys{padding:0 12px;color:var(--txt-faint);border-left:1px solid var(--line-faint);height:100%;display:flex;align-items:center;gap:12px;white-space:nowrap}
  #topbar .keys b{color:var(--txt-dim);font-weight:400;border:1px solid var(--line-faint);padding:0 4px;border-radius:2px}

  /* ---------- left rail ---------- */
  #rail{
    position:fixed;top:26px;left:0;bottom:22px;width:26px;z-index:40;
    background:#050505;border-right:1px solid var(--line-faint);
    display:flex;flex-direction:column;align-items:center;user-select:none;
  }
  .railtab{
    writing-mode:vertical-rl;transform:rotate(180deg);
    font-size:8px;letter-spacing:.22em;color:var(--txt-faint);
    padding:12px 0;cursor:pointer;border-bottom:1px solid var(--line-faint);
    width:100%;text-align:center;
  }
  .railtab:hover,.railtab.on{color:var(--txt);background:#0e0e0e}
  #rail .spacer{flex:1;border-bottom:none}

  /* ---------- status bar ---------- */
  #status{
    position:fixed;bottom:0;left:0;right:0;height:22px;z-index:40;
    background:#050505;border-top:1px solid var(--line-faint);
    display:flex;align-items:center;font-size:8.5px;letter-spacing:.06em;color:var(--txt-faint);
    user-select:none;
  }
  #status .cell{padding:0 10px;height:100%;display:flex;align-items:center;border-right:1px solid var(--line-faint);gap:6px;white-space:nowrap}
  #status .cell b{color:var(--txt-dim);font-weight:400}
  #status #hoverinfo{flex:1;color:var(--txt-dim);border-right:none;overflow:hidden;text-overflow:ellipsis}
  #status .meter{width:60px;height:5px;border:1px solid var(--line-faint);position:relative}
  #status .meter i{position:absolute;left:0;top:0;bottom:0;background:var(--line-dim)}
  .ledgrid{display:flex;gap:3px}
  .ledgrid i{width:4px;height:4px;border:1px solid var(--line-faint)}
  .ledgrid i.on{background:var(--led);border-color:var(--led)}

  /* ---------- canvas ---------- */
  #stage{position:fixed;top:26px;left:26px;right:0;bottom:22px;overflow:hidden;cursor:default}
  #stage.panning{cursor:grabbing}
  svg{display:block;width:100%;height:100%}
  svg text{font-family:var(--mono)}

  .node rect.body{fill:var(--box);stroke:var(--line-dim);stroke-width:1;shape-rendering:crispEdges}
  .node.hub rect.body{stroke:var(--line)}
  .node .lbl{fill:var(--txt);font-size:9px;letter-spacing:.04em}
  .node .sub{fill:var(--txt-dim);font-size:7px;letter-spacing:.03em}
  .node .tag{fill:var(--txt-faint);font-size:6.5px;letter-spacing:.12em}
  .node .port{fill:#000;stroke:var(--line-dim);stroke-width:1}
  .node .led{fill:none;stroke:var(--line-dim);stroke-width:1}
  .node .led.on{fill:var(--led);stroke:var(--led)}
  .node{cursor:pointer}
  .node:hover rect.body{stroke:var(--hot)}
  .node:hover .lbl{fill:var(--hot)}
  .node.drillable rect.body{stroke-dasharray:none}
  .node .drillmark{fill:none;stroke:var(--line-dim);stroke-width:1;shape-rendering:crispEdges}
  .node:hover .drillmark{stroke:var(--hot)}
  .node.sel rect.body{stroke:var(--hot);stroke-width:1.25}

  .cable{fill:none;stroke:var(--line-dim);stroke-width:1;opacity:.85}
  .cable.hi{stroke:var(--hot);opacity:1}
  .cable.dim{opacity:.18}
  .cable.dash{stroke-dasharray:3 3}

  .frame{fill:none;stroke:var(--line-faint);stroke-width:1;stroke-dasharray:4 4;shape-rendering:crispEdges}
  .frametitle{fill:var(--txt-dim);font-size:8px;letter-spacing:.28em}
  .badge circle{fill:#000;stroke:var(--line);stroke-width:1.25}
  .badge text{fill:var(--txt);font-size:11px;text-anchor:middle}
  .comment{fill:var(--txt-faint);font-size:7px;letter-spacing:.05em}
  .comment.bright{fill:var(--txt-dim)}
  .rule{stroke:var(--line-faint);stroke-width:1;shape-rendering:crispEdges}

  .wtoggle{fill:#000;stroke:var(--line-dim);stroke-width:1;shape-rendering:crispEdges}
  .wtoggle-x{stroke:var(--line-dim);stroke-width:1}
  .wslider{fill:none;stroke:var(--line-dim);stroke-width:1;shape-rendering:crispEdges}
  .wslider-k{fill:var(--line-dim)}
  .wmeter{fill:none;stroke:var(--line-faint);stroke-width:1;shape-rendering:crispEdges}
  .wmeter-f{fill:var(--line-dim)}
  .wnum{fill:#000;stroke:var(--line-dim);stroke-width:1;shape-rendering:crispEdges}
  .wnum-t{fill:var(--txt-dim);font-size:7px}
  .wscope{stroke:var(--line-dim);stroke-width:1;fill:none}

  /* ---------- inspector ---------- */
  #inspector{
    position:fixed;top:26px;right:0;bottom:22px;width:300px;z-index:45;
    background:#050505;border-left:1px solid var(--line-faint);
    transform:translateX(100%);transition:transform .18s ease;
    display:flex;flex-direction:column;
  }
  #inspector.open{transform:translateX(0)}
  #insp-head{padding:10px 12px;border-bottom:1px solid var(--line-faint);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  #insp-title{font-size:10px;letter-spacing:.1em;color:var(--txt)}
  #insp-kind{font-size:7px;letter-spacing:.2em;color:var(--txt-faint);margin-top:3px}
  #insp-x{font-size:10px;color:var(--txt-faint);cursor:pointer;border:1px solid var(--line-faint);padding:1px 6px}
  #insp-x:hover{color:var(--txt);border-color:var(--line-dim)}
  #insp-body{flex:1;overflow-y:auto;padding:10px 12px;scrollbar-width:thin;scrollbar-color:var(--line-faint) transparent}
  .insp-sec{margin-bottom:12px}
  .insp-sec h4{font-size:7px;letter-spacing:.24em;color:var(--txt-faint);border-bottom:1px solid var(--line-faint);padding-bottom:4px;margin-bottom:6px;font-weight:400}
  .insp-line{font-size:8.5px;line-height:1.65;color:var(--txt-dim);padding-left:10px;position:relative}
  .insp-line::before{content:"▸";position:absolute;left:0;color:var(--txt-faint);font-size:7px;top:2px}
  .insp-mono{font-size:8px;line-height:1.7;color:var(--txt-dim);background:#0a0a0a;border:1px solid var(--line-faint);padding:6px 8px;white-space:pre-wrap;word-break:break-all}
  #insp-drill{margin:0 12px 12px;border:1px solid var(--line-dim);background:transparent;color:var(--txt);
    font-family:var(--mono);font-size:8.5px;letter-spacing:.18em;padding:7px 0;cursor:pointer;display:none}
  #insp-drill:hover{background:#111;border-color:var(--hot)}

  /* ---------- search ---------- */
  #search{
    position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.72);display:none;
    align-items:flex-start;justify-content:center;padding-top:12vh;
  }
  #search.open{display:flex}
  #searchbox{width:520px;max-width:92vw;background:#060606;border:1px solid var(--line-dim)}
  #searchbox input{
    width:100%;background:transparent;border:none;outline:none;color:var(--txt);
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;padding:11px 14px;
    border-bottom:1px solid var(--line-faint);
  }
  #results{max-height:46vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line-faint) transparent}
  .res{padding:7px 14px;font-size:9px;color:var(--txt-dim);cursor:pointer;display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #101010}
  .res:hover,.res.k{background:#101010;color:var(--txt)}
  .res .path{color:var(--txt-faint);font-size:7.5px;letter-spacing:.08em;flex-shrink:0;align-self:center}

  #transition{position:fixed;top:26px;left:26px;right:0;bottom:22px;z-index:30;pointer-events:none}

  ::selection{background:#333;color:#fff}
</style>
</head>

function splitLines(t,n,max){
  const w=t.split(" · ").join(" · ").split(" ");let lines=[],cur="";
  for(const word of w){ if((cur+" "+word).trim().length>n){lines.push(cur.trim());cur=word;} else cur+=" "+word; }

  return lines.slice(0,max);
}

function hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}

// ---------- geometry helpers ----------
function nodeH(n){
  let h=22 + (n.s?n.s.length*9.5:0);
  if(n.wg){ let extra=0; n.wg.forEach(w=>{ if(w[0]==="scp") extra=Math.max(extra,44); else if(w[0]==="mtr"&&w[2]>h-14) extra=Math.max(extra,10);}); h+=extra? (n.wg.some(w=>w[0]==="scp")?50:8):6;}
  return Math.max(30,Math.ceil(h)+6);
}
const geom={}; // per level: id -> {x,y,w,h}
function computeGeom(id){
  const L=LEVELS[id], g={};
  L.nodes.forEach(n=>{ g[n.id]={x:n.x,y:n.y,w:n.w,h:nodeH(n)}; });
  geom[id]=g; return g;
}

function pathTo(levelId){

  else if(t==="num"){ el("rect",{class:"wnum",x,y,width:34,height:13},g);
    el("text",{class:"wnum-t",x:x+4,y:y+9.5},g).textContent=(hash(n.id)%900+100)/10;}
  else if(t==="scp"){ const wd=v||120, h2=34; el("rect",{class:"wmeter",x,y,width:wd,height:h2},g);
    let d="M"+x+" "+(y+h2/2), seed=hash(n.id);
    for(let i=1;i<=40;i++){ seed=Math.imul(seed,48271)%2147483647; const yy=y+h2/2+((seed%1000)/1000-0.5)*(h2-8)*Math.sin(i/4);
      d+=" L"+(x+(wd/40)*i).toFixed(1)+" "+yy.toFixed(1);}
    el("path",{class:"wscope",d},g);}
}

// ---------- cable path ----------
function cablePath(a,b,of=.5,inf=.5){
  const x1=a.x+a.w*of, y1=a.y+a.h, x2=b.x+b.w*inf, y2=b.y;
  const dy=Math.max(24,Math.abs(y2-y1)*.5), extra=(y2<y1)?Math.max(40,(y1-y2)*.35+40):0;
  return `M${x1} ${y1} C ${x1} ${y1+dy+extra}, ${x2} ${y2-dy-extra}, ${x2} ${y2}`;
}

// ---------- render level ----------
let cableEls=[], nodeIndex={};
function render(levelId){
  const L=LEVELS[levelId]; if(!L){console.warn("missing level",levelId);return;}
  world.innerHTML=""; cableEls=[]; nodeIndex={}; selected=null; hideInspector();
  const gm=computeGeom(levelId);

  // frames
  (L.frames||[]).forEach(f=>{
    el("rect",{class:"frame",x:f.x,y:f.y,width:f.w,height:f.h},world);
    if(f.t) el("text",{class:"frametitle",x:f.x+ (f.b?34:8), y:f.y-6},world).textContent=f.t;
    if(f.b){ const bg=el("g",{class:"badge"},world);
      el("circle",{cx:f.x+14,cy:f.y-11,r:11},bg);
      el("text",{x:f.x+14,y:f.y-7},bg).textContent=f.b; }
  });
  // level headline
  el("text",{x:36,y:26,fill:"#e6e6e6","font-size":"13","letter-spacing":".3em"},world).textContent=L.title;
  el("line",{class:"rule",x1:36,y1:33,x2:36+L.title.length*10.5,y2:33},world);
  // comments
  (L.comments||[]).forEach(c=>{ el("text",{class:"comment"+(c.bright?" bright":""),x:c.x,y:c.y},world).textContent=c.t; });

  // cables (under nodes)
  const cg=el("g",{},world);
  (L.cables||[]).forEach(([a,b,o={}])=>{
    if(!gm[a]||!gm[b])return;
    const p=el("path",{class:"cable"+(o.d?" dash":""),d:cablePath(gm[a],gm[b],o.of,o.if)},cg);
    cableEls.push({a,b,el:p});
  });

  // nodes
  L.nodes.forEach(n=>{
    const g=geom[levelId][n.id];
    const grp=el("g",{class:"node"+(n.hub?" hub":"")+(n.drill?" drillable":"")},world);
    el("rect",{class:"body",x:g.x,y:g.y,width:g.w,height:g.h},grp);
    if(n.drill){ el("rect",{class:"drillmark",x:g.x+2,y:g.y+2,width:g.w-4,height:g.h-4},grp);
      el("text",{x:g.x+g.w-11,y:g.y+12,fill:"#8f8f8f","font-size":"8"},grp).textContent="▸";}
    // ports
    [[.18,0],[.5,0],[.82,0]].forEach(([f])=>el("rect",{class:"port",x:g.x+g.w*f-2.5,y:g.y-1.5,width:5,height:3},grp));
    [[.18],[.5],[.82]].forEach(([f])=>el("rect",{class:"port",x:g.x+g.w*f-2.5,y:g.y+g.h-1.5,width:5,height:3},grp));
    // label
    el("text",{class:"lbl",x:g.x+7,y:g.y+13},grp).textContent=n.l;
    (n.s||[]).forEach((s,i)=>{ if(s) el("text",{class:"sub",x:g.x+7,y:g.y+23.5+i*9.5},grp).textContent=s; });
    if(n.tag) el("text",{class:"tag",x:g.x+g.w-7-n.tag.length*5.2,y:g.y+g.h-5},grp).textContent=n.tag;
    // deterministic corner led
    if(!n.wg||!n.wg.some(w=>w[0]==="led")){ const on=(hash(n.id)%5===0);
      el("circle",{class:"led"+(on?" on":""),cx:g.x+g.w-8,cy:g.y+g.h-8,r:2.2},grp).dataset&&0;}
    (n.wg||[]).forEach(w=>drawWidget(grp,w,n,g));
    // interactions
    grp.addEventListener("mouseenter",()=>hoverNode(n,true));
    grp.addEventListener("mouseleave",()=>hoverNode(n,false));
    grp.addEventListener("click",e=>{e.stopPropagation(); selectNode(levelId,n,grp);});
    grp.addEventListener("dblclick",e=>{e.stopPropagation(); if(n.drill) drill(n);});
    nodeIndex[n.id]={n,grp};
  });

  // chrome
  document.getElementById("st-level").textContent="L"+L.depth;
  document.getElementById("st-name").textContent=L.title.split("—")[0].trim();
  document.getElementById("st-nodes").textContent=L.nodes.length;
  document.getElementById("st-cables").textContent=(L.cables||[]).length;
  document.getElementById("st-depth").textContent=stack.length-1;
  renderCrumbs(); markRail(levelId);
  fit();
}

function hoverNode(n,on){
  cableEls.forEach(c=>{
    const hit=(c.a===n.id||c.b===n.id);
    c.el.classList.toggle("hi",on&&hit);
    c.el.classList.toggle("dim",on&&!hit);
  });
  const info=document.getElementById("hoverinfo");
  info.textContent=on? (n.l+"  ·  "+((n.s||[]).join(" / ")||"")+(n.drill?"  ·  [dbl-click ⤓ drill]":"")) : "—";
}

// ---------- selection / inspector ----------
const insp=document.getElementById("inspector");
function selectNode(levelId,n,grp){
  world.querySelectorAll(".node.sel").forEach(x=>x.classList.remove("sel"));
  grp.classList.add("sel"); selected=n;
  document.getElementById("insp-title").textContent=n.l;
  document.getElementById("insp-kind").textContent=(n.tag||"NODE")+" · "+LEVELS[levelId].title;
  const body=document.getElementById("insp-body"); body.innerHTML="";
  if(n.s&&n.s.filter(Boolean).length){ body.appendChild(sec("SIGNAL",n.s.filter(Boolean))); }
  if(n.detail) for(const k in n.detail) body.appendChild(sec(k,n.detail[k]));
  const btn=document.getElementById("insp-drill");
  btn.style.display=n.drill?"block":"none";
  btn.onclick=()=>drill(n);
  insp.classList.add("open");
}
function sec(title,lines){
  const d=document.createElement("div");d.className="insp-sec";
  const h=document.createElement("h4");h.textContent=title;d.appendChild(h);
  lines.forEach(t=>{const p=document.createElement("div");p.className="insp-line";p.textContent=t;d.appendChild(p);});
  return d;
}
function hideInspector(){insp.classList.remove("open");}
document.getElementById("insp-x").onclick=hideInspector;

// ---------- drill / navigation ----------
function drill(n){
  if(!n.drill||!LEVELS[n.drill])return;
  const lid=stack[stack.length-1], g=geom[lid][n.id];
  zoomInto(g,()=>{ stack.push(n.drill); render(n.drill); flashIn(); });
}
function up(){
  if(stack.length<=1){hideInspector();return;}
  stack.pop(); render(stack[stack.length-1]); flashIn();
}
function goTo(levelId){
  if(!LEVELS[levelId])return;
  stack=pathTo(levelId); render(levelId); flashIn();
}
function zoomInto(g,done){
  const r=stage.getBoundingClientRect();
  const cx=g.x+g.w/2, cy=g.y+g.h/2, targetK=view.k*4;
  const sx=r.width/2-cx*targetK, sy=r.height/2-cy*targetK;
  const t0=performance.now(), v0={...view};
  (function step(t){
    const p=Math.min(1,(t-t0)/200), e=p*p*(3-2*p);
    view={x:v0.x+(sx-v0.x)*e, y:v0.y+(sy-v0.y)*e, k:v0.k+(targetK-v0.k)*e};
    apply(); world.style.opacity=String(1-e*.85);
    if(p<1)requestAnimationFrame(step); else {world.style.opacity="1";done();}
  })(t0);
}
function flashIn(){
  world.style.opacity="0";
  requestAnimationFrame(()=>{world.style.transition="opacity .16s";world.style.opacity="1";
    setTimeout(()=>world.style.transition="",180);});
}

// crumbs / rail
function renderCrumbs(){
  const c=document.getElementById("crumbs"); c.innerHTML="";
  stack.forEach((lid,i)=>{
    const d=document.createElement("div");d.className="crumb"+(i===stack.length-1?" cur":"");
    d.innerHTML=LEVELS[lid].title.split("—")[0].trim()+(i<stack.length-1?'<span class="sep">▸</span>':"");
    d.onclick=()=>{stack=stack.slice(0,i+1);render(lid);flashIn();};
    c.appendChild(d);
  });
}
function markRail(lid){
  document.querySelectorAll(".railtab").forEach(t=>{
    t.classList.toggle("on",t.dataset.go===lid||(t.dataset.go==="root"&&lid==="root"));
  });
}
document.querySelectorAll(".railtab[data-go]").forEach(t=>t.onclick=()=>goTo(t.dataset.go));

// ---------- pan / zoom ----------
function apply(){
  world.setAttribute("transform",`translate(${view.x},${view.y}) scale(${view.k})`);
  document.getElementById("st-zoom").textContent=Math.round(view.k*100)+"%";
  document.getElementById("st-zm").style.width=Math.min(100,view.k*50)+"%";
}
function fit(){
  const L=LEVELS[stack[stack.length-1]], r=stage.getBoundingClientRect();
  const k=Math.min(r.width/(L.w+40), r.height/(L.h+40), 1.15);
  view={x:(r.width-L.w*k)/2, y:(r.height-L.h*k)/2+6, k}; apply();
}
let pan=null;
stage.addEventListener("mousedown",e=>{ if(e.target.closest(".node"))return;
  pan={x:e.clientX,y:e.clientY,vx:view.x,vy:view.y}; stage.classList.add("panning");});
window.addEventListener("mousemove",e=>{ if(!pan)return;
  view.x=pan.vx+(e.clientX-pan.x); view.y=pan.vy+(e.clientY-pan.y); apply();});
window.addEventListener("mouseup",()=>{pan=null;stage.classList.remove("panning");});
stage.addEventListener("wheel",e=>{ e.preventDefault();
  const r=stage.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const dk=Math.exp(-e.deltaY*0.0012), nk=Math.min(4,Math.max(.15,view.k*dk));
  view.x=mx-(mx-view.x)*(nk/view.k); view.y=my-(my-view.y)*(nk/view.k); view.k=nk; apply();
},{passive:false});
stage.addEventListener("dblclick",e=>{ if(!e.target.closest(".node")) up(); });
window.addEventListener("resize",fit);

// ---------- search ----------
const SIDX=[];
for(const lid in LEVELS){ LEVELS[lid].nodes.forEach(n=>{
  SIDX.push({lid,nid:n.id,l:n.l,s:(n.s||[]).join(" "),t:LEVELS[lid].title,
    hay:(n.l+" "+(n.s||[]).join(" ")+" "+JSON.stringify(n.detail||{})+" "+LEVELS[lid].title).toLowerCase()});
});}
const searchEl=document.getElementById("search"), qEl=document.getElementById("q"), resEl=document.getElementById("results");
let resList=[],resK=0;
function openSearch(){searchEl.classList.add("open");qEl.value="";runSearch("");qEl.focus();}
function closeSearch(){searchEl.classList.remove("open");}
function runSearch(q){
  q=q.toLowerCase().trim();
  resList=(q?SIDX.filter(r=>r.hay.includes(q)):SIDX.slice(0,40)).slice(0,40); resK=0;
  resEl.innerHTML="";
  resList.forEach((r,i)=>{
    const d=document.createElement("div");d.className="res"+(i===0?" k":"");
    d.innerHTML=`<span>${r.l}<span style="color:#5d5d5d">  ${r.s.slice(0,44)}</span></span><span class="path">${r.t.split("—")[0].trim()}</span>`;
    d.onclick=()=>jump(r); resEl.appendChild(d);
  });
}
function jump(r){
  closeSearch(); goTo(r.lid);
  const rec=nodeIndex[r.nid]; if(rec){ selectNode(r.lid,rec.n,rec.grp);
    const g=geom[r.lid][r.nid], rct=stage.getBoundingClientRect();
    view.x=rct.width/2-(g.x+g.w/2)*view.k; view.y=rct.height/2-(g.y+g.h/2)*view.k; apply(); }
}
qEl.addEventListener("input",()=>runSearch(qEl.value));
qEl.addEventListener("keydown",e=>{
  if(e.key==="Escape"){closeSearch();e.stopPropagation();}
  if(e.key==="ArrowDown"){resK=Math.min(resList.length-1,resK+1);paintK();e.preventDefault();}
  if(e.key==="ArrowUp"){resK=Math.max(0,resK-1);paintK();e.preventDefault();}
  if(e.key==="Enter"&&resList[resK])jump(resList[resK]);
});
function paintK(){[...resEl.children].forEach((c,i)=>c.classList.toggle("k",i===resK));}
searchEl.addEventListener("click",e=>{if(e.target===searchEl)closeSearch();});

// ---------- keyboard ----------
const REGION_KEYS={"1":"cloudflare","2":"aws","3":"agents","4":"ihive","5":"intake","6":"digitization","7":"observability","8":"terraform"};
window.addEventListener("keydown",e=>{
  if(searchEl.classList.contains("open"))return;
  if(e.key==="/"||((e.ctrlKey||e.metaKey)&&e.key==="k")){e.preventDefault();openSearch();}
  else if(e.key==="Escape"||e.key==="Backspace"){ if(insp.classList.contains("open")&&e.key==="Escape"&&selected){hideInspector();selected=null;} else up(); }
  else if(e.key==="f"||e.key==="F")fit();
  else if(REGION_KEYS[e.key])goTo(REGION_KEYS[e.key]);
  else if(e.key==="0")goTo("root");
});

// ---------- ambient bus LEDs ----------
const bus=document.getElementById("busleds");
for(let i=0;i<8;i++){const s=document.createElement("i");bus.appendChild(s);}
setInterval(()=>{ [...bus.children].forEach((s,i)=>s.classList.toggle("on",Math.random()<0.35)); },700);

// boot
render("root");

</script>
</body>
</html>
